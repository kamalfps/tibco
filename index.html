<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIBCO • Independent Brewer</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Switzer:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">

  <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

  <div class="cursor"></div>
  <div class="cursor-follower"></div>

  <nav class="nav">
    <div class="nav-logo">TIBCO.</div>
    <div class="nav-links">
      <a href="#menu" class="magnetic" data-strength="20">Menu</a>
      <a href="#locations" class="magnetic" data-strength="20">Sanctuaries</a>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-wrapper">
        <p class="fade-up">Surat, Gujarat</p>
        <h1 class="title">
          <div class="line-wrap"><span class="line">The Art of</span></div>
          <div class="line-wrap"><span class="line italic">Independence.</span></div>
        </h1>
        <div class="hero-bottom">
          <p class="fade-up delay">Ethically sourced. Meticulously roasted. Uncompromisingly brewed.</p>
          <a href="#menu" class="btn magnetic" data-strength="40">
            <span class="btn-text">Explore</span>
          </a>
        </div>
      </div>
    </section>

    <section class="parallax-section">
      <div class="image-container">
        <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?q=80&w=2000&auto=format&fit=crop" alt="Pour over coffee" class="parallax-img">
      </div>
    </section>

    <section class="text-section">
      <div class="container">
        <h2 class="large-text">
          <div class="line-wrap"><span class="line">We bypass commercial trends</span></div>
          <div class="line-wrap"><span class="line">to source unique beans</span></div>
          <div class="line-wrap"><span class="line italic">directly from estates.</span></div>
        </h2>
      </div>
    </section>

    <footer class="footer">
      <h1 class="footer-title">TIBCO</h1>
      <div class="footer-bottom">
        <p>© 2024 The Independent Brewer's Coffee</p>
        <a href="#" class="magnetic" data-strength="20">Instagram</a>
      </div>
    </footer>
  </main>

  <script src="main.js"></script>
</body>
</html>
