<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIBCO • The Independent Brewer's Coffee</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet" />
  
  <!-- Advanced Three.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 3D Canvas Container -->
  <div id="canvas-container"></div>

  <!-- UI Overlay -->
  <main class="ui-layer">
    <nav class="navbar">
      <div class="logo-container">
        <!-- Make sure logo.png is still in your repo! -->
        <img src="logo.png" alt="TIBCO" class="logo-img" />
        <span class="logo-text">TIBCO</span>
      </div>
      <div class="nav-links">
        <a href="#philosophy">Philosophy</a>
        <a href="#menu">The Menu</a>
        <a href="#locations">Sanctuaries</a>
      </div>
    </nav>

    <div class="hero-content">
      <span class="tagline">Surat, Gujarat</span>
      <h1>The Art of<br>Independence.</h1>
      <p>Ethically sourced. Meticulously roasted. Uncompromisingly brewed. Experience the pinnacle of specialty coffee.</p>
      <a href="#menu" class="btn">Explore the Craft</a>
    </div>

    <div class="scroll-indicator">
      <span>Discover</span>
      <div class="line"></div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
